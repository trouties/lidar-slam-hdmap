# SUP-08 ROS2 parameter file. Mirrors the Stage 2/3 sections of
# ../../../configs/default.yaml. Keep values in sync — this is a deliberate
# duplicate to avoid cross-workspace imports inside launch-time param loading.

kitti_player_node:
  ros__parameters:
    kitti_root: "~/data/kitti/odometry/dataset"
    sequence: "00"
    max_frames: 500      # 0 = entire sequence
    rate_scale: 1.0      # 1.0 = real-time per times.txt; >1 speeds up
    frame_id: "velodyne"
    topic: "/velodyne_points"

odom_node:
  ros__parameters:
    # KISS-ICP config (= configs/default.yaml:kiss_icp)
    kiss_max_range: 100.0
    kiss_min_range: 5.0
    kiss_voxel_size: 1.0
    # Frames
    map_frame: "map"
    lidar_frame: "velodyne"
    # Topics
    cloud_topic: "/velodyne_points"
    odom_topic: "/odom"
    path_topic: "/slam_path"
    # Logging / telemetry
    log_every_n: 50      # print timing summary every N frames
    csv_path: ""         # "" = disabled; else absolute path for per-frame CSV

pose_graph_node:
  ros__parameters:
    # Stage 3 trigger: rebuild graph every K new keyframes
    keyframe_stride: 50
    max_keyframes: 2000  # hard memory cap; beyond this we stop adding
    # Topics
    cloud_topic: "/velodyne_points"
    odom_topic: "/odom"
    optimized_path_topic: "/optimized_path"
    loop_markers_topic: "/loop_markers"
    map_frame: "map"
    # Sync slop (s) between /odom and /velodyne_points
    sync_slop: 0.05
    # GTSAM odom / prior sigmas (= configs/default.yaml:gtsam)
    odom_sigmas: [0.1, 0.1, 0.1, 0.01, 0.01, 0.01]
    prior_sigmas: [0.01, 0.01, 0.01, 0.001, 0.001, 0.001]
    # Loop closure (= configs/default.yaml:loop_closure)
    loop_mode: "v2"
    loop_distance_threshold: 15.0
    loop_min_frame_gap: 100
    loop_icp_fitness_threshold: 0.9
    loop_icp_downsample_voxel: 1.0
    # Scan Context
    sc_num_rings: 20
    sc_num_sectors: 60
    sc_max_range: 80.0
    sc_distance_threshold: 0.4
    sc_top_k: 25
    sc_query_stride: 1
    sc_max_matches_per_query: 5
