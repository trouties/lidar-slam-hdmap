# SUP-09 one-command reproduction stack.
#
# Usage (on a clean x86_64 Linux machine):
#   git clone <repo> && cd lidar-slam-lanelet2
#   docker compose build           # ~6-8 min, pip install dominates
#   docker compose up              # ~1-2 min: hydrate subset + run pipeline
#
# Outputs land on the host under ./results/:
#   - results/ape.txt          (n_frames=, ape_rmse=, ...)
#   - results/trajectory.png   (BEV estimate vs ground truth)
#
# The 200-frame KITTI Seq 00 subset is cached under ./cache_sup09 on first
# run so subsequent `docker compose up` invocations skip the download.

services:
  sup09:
    build:
      context: .
      dockerfile: docker/Dockerfile.sup09
    image: lidar-slam-lanelet2-sup09:latest
    environment:
      # GitHub Release asset URL. Override via shell env or a local .env file
      # if you mirror the tarball elsewhere. Keeping the default empty lets
      # the entrypoint fail fast with a clear message when neither a cached
      # subset nor a URL is supplied.
      SUP09_SUBSET_URL: "${SUP09_SUBSET_URL:-}"
      SUP09_SUBSET_SHA256: "${SUP09_SUBSET_SHA256:-}"
      SEQUENCE: "00"
      MAX_FRAMES: "200"
    volumes:
      - ./results:/app/results
      - ./cache_sup09:/data
    # Linux docker engine does not auto-map host.docker.internal; Docker Desktop
    # does. Keeping the explicit mapping is harmless on both — it gives the
    # acceptance harness (and any user serving the tarball from localhost) a
    # reliable way to reach the host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
