# SUP-01 Phase D (2026-04-18): four knob tests all failed to improve beyond
# Phase C's 88.63 m APE_SE3 on Seq 00 (see results/diagnostics/phaseC_report.md
# for the D.1-D.4 summary table). Reverted to Phase C minimal config:
#   D.1 feature_extract_enable=true           →  87.61 m (no-op, −1.2%)
#   D.2 filter_size_surf/map=0.25 in mapping/ →  87.57 m (wrong path, no-op)
#   D.3 cube_side_length=1000                 →  99.80 m (REGRESSED; cube is
#                                                 a sliding window around
#                                                 current pos, larger retains
#                                                 stale points)
#   D.4 filter_size_surf/map=0.25 at root     →  90.38 m (marginal; Z drift
#                                                 worsened to −33 m)
# Conclusion: 88 m is FAST-LIO2 pure-odometry architectural ceiling on Seq 00
# without loop closure. Paper's 3.57 m ATE uses GTSAM loop-closure post-
# processing; vanilla FAST-LIO2 odometry has no mechanism to correct
# accumulated drift when the vehicle re-enters the start area at frame 2251.

common:
    lid_topic: "/velodyne_points"
    imu_topic: "/imu/data"
    time_sync_en: false
    time_offset_lidar_to_imu: 0.0

preprocess:
    lidar_type: 2                  # 2 = Velodyne
    scan_line: 64                  # HDL-64E
    blind: 2.0                    # min range (m)
    point_filter_num: 4           # downsample: keep every 4th point
    # SUP-01 Phase D.1 (2026-04-18): tested feature_extract_enable=true on
    # Seq 00, APE_SE3 changed 88.63 → 87.61 m (−1.2%, noise-level).
    # Reverted to false; feature path doesn't help on dense HDL-64E + KITTI.
    feature_extract_enable: false
    scan_rate: 10                 # 10 Hz
    # SUP-01 Phase B.2 v3: kitti_to_rosbag.py writes PointCloud2.time in
    # seconds (0..0.1 s per scan). FAST-LIO2 upstream default timestamp_unit
    # is 2 (microsecond), so 0.1 s was interpreted as 0.1 us => deskew
    # window collapsed to zero => no motion compensation => ~3% drift (110 m
    # APE_SE3 on Seq 00). Setting to 0 (seconds) matches our bag format.
    timestamp_unit: 0
    # SUP-01 Phase C: KITTI .bin is vendor-deskewed (HDL-64E compensates to
    # scan-center pose before .bin is written). FAST-LIO2's internal deskew
    # therefore double-compensates, producing 134 m APE_SE3 on Seq 00
    # (Phase B v3 data point, see results/diagnostics/phaseB_report.md).
    # true = bypass the point-level backward compensation loop in
    # ImuProcess::UndistortPcl. IMU forward propagation + kf_state.predict
    # remain enabled. Requires the Docker image to be built with
    # external/baselines/fast_lio2/kitti_skip_deskew.patch applied; if the
    # patch is missing the parameter is silently ignored and Phase B v3
    # behavior (134 m APE) returns. audit_baseline_configs.py enforces
    # skip_undistortion: true in the repo-tracked config as a regression guard.
    skip_undistortion: true

mapping:
    # SUP-01 Phase B.2: OxTS RT3003 datasheet — accel noise_density
    # ~3.99e-3 m/s^2/sqrt(Hz), gyro noise_density ~1.56e-3 rad/s/sqrt(Hz).
    # At 100 Hz IMU rate, variances are ~1.59e-3 and ~2.4e-4 respectively.
    # FAST-LIO2 upstream defaults of 0.1 are 60-400x looser than physics,
    # which over-downweights IMU and lets LiDAR-ICP drift dominate. Values
    # below leave ~3x (acc) / ~2x (gyr) margin over datasheet.
    acc_cov: 0.005
    gyr_cov: 0.0005
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    fov_degree: 180
    det_range: 100.0
    extrinsic_est_en: false
    # SUP-01 Phase D.2 (2026-04-18): tested filter_size_surf=map=0.25 here,
    # but nh.param reads filter_size_{surf,map} as TOP-LEVEL params (see
    # laserMapping.cpp L771-773), not under mapping/. These lines had no
    # effect. Leaving as documentation for the path-name gotcha.
    # LiDAR-to-IMU extrinsic, derived from KITTI Raw 2011_10_03/calib_imu_to_velo.txt
    # via scripts/derive_baseline_extrinsic.py --date 2011_10_03. FAST-LIO2's
    # extrinsic_R is R_imu_from_velo (rotates LiDAR vectors into the IMU frame)
    # and extrinsic_T is the LiDAR origin expressed in the IMU frame, i.e.
    # -R_imu_from_velo @ T_velo_from_imu. Previously these were hard-coded to
    # identity / zero (no rotation, no translation) which ignored the ~0.8 m
    # LiDAR-IMU offset present in the KITTI sensor rig (SUP-01 P0-1). Note:
    # valid for 2011_10_03 drives only (Seq 00/01/02). For 2011_09_30 drives
    # (Seq 04-10) re-derive once the calib zip is downloaded.
    extrinsic_T: [ 8.105439e-01, -3.070544e-01,  8.027241e-01]
    extrinsic_R: [ 9.999976e-01, -7.854027e-04,  2.024406e-03,
                   7.553071e-04,  9.998898e-01,  1.482454e-02,
                  -2.035826e-03, -1.482298e-02,  9.998881e-01]

publish:
    path_en: true
    scan_publish_en: true
    dense_publish_en: false
    scan_bodyframe_pub_en: false

pcd_save:
    pcd_save_en: false
