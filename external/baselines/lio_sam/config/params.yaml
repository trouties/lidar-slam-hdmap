lio_sam:

  # Topics — match our rosbag topic names
  pointCloudTopic: "/velodyne_points"
  imuTopic: "/imu/data"
  odomTopic: "odometry/imu"
  gpsTopic: "odometry/gpsz"

  # Frames
  lidarFrame: "velodyne"
  baselinkFrame: "velodyne"
  odometryFrame: "odom"
  mapFrame: "map"

  # GPS (disabled for KITTI Odometry)
  useImuHeadingInitialization: true
  useGpsElevation: false
  gpsCovThreshold: 2.0
  poseCovThreshold: 25.0

  # Save
  savePCD: false
  savePCDDirectory: "/tmp/lio_sam/"

  # Sensor: KITTI Velodyne HDL-64E
  sensor: velodyne
  N_SCAN: 64
  Horizon_SCAN: 1800
  downsampleRate: 1
  lidarMinRange: 5.0
  lidarMaxRange: 100.0

  # IMU Settings (OxTS RT3003)
  imuAccNoise: 3.9939570888238808e-03
  imuGyrNoise: 1.5636343949698187e-03
  imuAccBiasN: 6.4356659353532566e-05
  imuGyrBiasN: 3.5640318696367613e-05
  imuGravity: 9.80511
  imuRPYWeight: 0.01

  # Extrinsics: IMU-to-LiDAR, derived from KITTI Raw 2011_10_03/calib_imu_to_velo.txt
  # via scripts/derive_baseline_extrinsic.py --date 2011_10_03. LIO-SAM's
  # extrinsicRot rotates IMU body-frame linear accel / angular velocity into
  # the LiDAR frame, i.e. R_velo_from_imu. extrinsicTrans is the IMU origin
  # expressed in the LiDAR frame (T from the calib file). Previously these
  # were hard-coded to a non-physical 180-ish rotation which caused ~550 m
  # drift on Seq 00 (SUP-01 P0-1). Note: KITTI Raw calib is shared within a
  # date, so this value is valid for any drive collected on 2011_10_03
  # (Seq 00/01/02). For 2011_09_30 drives (Seq 04-10) re-run the derive
  # script with --date 2011_09_30 once the calib zip is downloaded.
  extrinsicTrans: [-8.086759e-01,  3.195559e-01, -7.997231e-01]
  extrinsicRot: [ 9.999976e-01,  7.553071e-04, -2.035826e-03,
                 -7.854027e-04,  9.998898e-01, -1.482298e-02,
                  2.024406e-03,  1.482454e-02,  9.998881e-01]
  extrinsicRPY: [ 9.999976e-01,  7.553071e-04, -2.035826e-03,
                 -7.854027e-04,  9.998898e-01, -1.482298e-02,
                  2.024406e-03,  1.482454e-02,  9.998881e-01]

  # LOAM feature threshold
  edgeThreshold: 1.0
  surfThreshold: 0.1
  edgeFeatureMinValidNum: 10
  surfFeatureMinValidNum: 100

  # Voxel filter
  odometrySurfLeafSize: 0.4
  mappingCornerLeafSize: 0.2
  mappingSurfLeafSize: 0.4

  # Motion constraint
  z_tollerance: 1000
  rotation_tollerance: 1000

  # CPU
  numberOfCores: 4
  mappingProcessInterval: 0.15

  # Surrounding map
  surroundingkeyframeAddingDistThreshold: 1.0
  surroundingkeyframeAddingAngleThreshold: 0.2
  surroundingKeyframeDensity: 2.0
  surroundingKeyframeSearchRadius: 50.0

  # Loop closure
  loopClosureEnableFlag: true
  loopClosureFrequency: 1.0
  surroundingKeyframeSize: 50
  historyKeyframeSearchRadius: 15.0
  historyKeyframeSearchTimeDiff: 30.0
  historyKeyframeSearchNum: 25
  historyKeyframeFitnessScore: 0.3

  # Visualization
  globalMapVisualizationSearchRadius: 1000.0
  globalMapVisualizationPoseDensity: 10.0
  globalMapVisualizationLeafSize: 1.0
