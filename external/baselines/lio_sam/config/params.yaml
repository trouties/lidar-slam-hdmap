lio_sam:

  # Topics — match our rosbag topic names
  pointCloudTopic: "/velodyne_points"
  imuTopic: "/imu/data"
  odomTopic: "odometry/imu"
  gpsTopic: "odometry/gpsz"

  # Frames
  lidarFrame: "velodyne"
  baselinkFrame: "velodyne"
  odometryFrame: "odom"
  mapFrame: "map"

  # GPS (disabled for KITTI Odometry).
  # useImuHeadingInitialization = false: OxTS yaw is an absolute ENU heading
  # (north = 0, CCW), so LIO-SAM would otherwise rotate its first pose by
  # that absolute angle, leaving the trajectory offset from KITTI GT's
  # "first pose = identity" convention by the vehicle's initial heading
  # (~60 deg on Seq 00). Empirically this flag is also necessary to avoid
  # IMU-preintegration runaway under nav-frame accel + datasheet noise;
  # see SUP-01 P0-1 rework notes in refs/sup-notes.md for measurements.
  useImuHeadingInitialization: false
  useGpsElevation: false
  gpsCovThreshold: 2.0
  poseCovThreshold: 25.0

  # Save
  savePCD: false
  savePCDDirectory: "/tmp/lio_sam/"

  # Sensor: KITTI Velodyne HDL-64E
  sensor: velodyne
  N_SCAN: 64
  Horizon_SCAN: 1800
  downsampleRate: 1
  lidarMinRange: 5.0
  lidarMaxRange: 100.0

  # IMU Settings — OxTS RT3003 datasheet values. The earlier 100x-inflated
  # workaround was a wrong-direction fix; the real bug was that we were
  # feeding LIO-SAM nav-frame, gravity-compensated accelerations from OxTS
  # cols 11-13 instead of body-frame raw accelerations. Handled in
  # common/kitti_to_rosbag.py::_oxts_body_accel (cols 14-16, body-frame
  # specific force; OxTS af/al/au already include g, so no gravity
  # reinjection — the gravity-reinjection premise was empirically wrong
  # for KITTI). See SUP-01 P0-1 Stage 3 in refs/sup-notes.md.
  imuAccNoise: 3.9939570888238808e-03
  imuGyrNoise: 1.5636343949698187e-03
  imuAccBiasN: 6.4356659353532566e-05
  imuGyrBiasN: 3.5640318696367613e-05
  imuGravity: 9.80511
  imuRPYWeight: 0.01

  # Extrinsics — placeholders. INJECTED at build time by
  # external/baselines/common/inject_kitti_extrinsic.py from the KITTI Raw
  # calib_imu_to_velo.txt of the matching date. Do NOT hand-edit; per-seq
  # docker tags (slam-baselines/lio_sam:seq00, :seq05, ...) are produced by
  # `make build-liosam-<seq>` so each sequence carries its own calibration.
  # extrinsicRPY is set equal to extrinsicRot (= R_velo_imu), matching the
  # upstream params_kitti.yaml. Forcing it to a pure identity (because
  # R_velo_imu is "close enough to I") regresses Seq 00 SE(3) APE from 30 m
  # to 44 m -- LIO-SAM treats RPY as exact, not as an approximation. See
  # SUP-01 P0-1 rework notes in refs/sup-notes.md for the measurement.
  extrinsicTrans: [-8.086759000e-01, 3.195559000e-01, -7.997231000e-01]
  extrinsicRot: [9.999976000e-01, 7.553071000e-04, -2.035826000e-03, -7.854027000e-04, 9.998898000e-01, -1.482298000e-02, 2.024406000e-03, 1.482454000e-02, 9.998881000e-01]
  extrinsicRPY: [9.999976000e-01, 7.553071000e-04, -2.035826000e-03, -7.854027000e-04, 9.998898000e-01, -1.482298000e-02, 2.024406000e-03, 1.482454000e-02, 9.998881000e-01]

  # LOAM feature threshold
  edgeThreshold: 1.0
  surfThreshold: 0.1
  edgeFeatureMinValidNum: 10
  surfFeatureMinValidNum: 100

  # Voxel filter
  odometrySurfLeafSize: 0.4
  mappingCornerLeafSize: 0.2
  mappingSurfLeafSize: 0.4

  # Motion constraint
  z_tollerance: 1000
  rotation_tollerance: 1000

  # CPU
  numberOfCores: 4
  mappingProcessInterval: 0.15

  # Surrounding map
  surroundingkeyframeAddingDistThreshold: 1.0
  surroundingkeyframeAddingAngleThreshold: 0.2
  surroundingKeyframeDensity: 2.0
  surroundingKeyframeSearchRadius: 50.0

  # Loop closure
  loopClosureEnableFlag: true
  loopClosureFrequency: 1.0
  surroundingKeyframeSize: 50
  historyKeyframeSearchRadius: 15.0
  historyKeyframeSearchTimeDiff: 30.0
  historyKeyframeSearchNum: 25
  historyKeyframeFitnessScore: 0.3

  # Visualization
  globalMapVisualizationSearchRadius: 1000.0
  globalMapVisualizationPoseDensity: 10.0
  globalMapVisualizationLeafSize: 1.0
