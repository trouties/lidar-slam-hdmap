# SUP-09 Docker Compose one-command reproduction config.
# Trimmed from configs/default.yaml for the 200-frame KITTI Seq 00 subset
# that ships in GitHub Release sup09-subset-v1.
#
# Key deviations from default.yaml:
#   - data.kitti_root -> /data          (compose mounts the subset here)
#   - output.dir      -> /app/results   (compose mounts the host results dir)
#   - loop_closure.mode -> v1           (200 frames: no meaningful Scan Context
#                                        loops; skip SC descriptor build cost)
#   - sup07 disabled                    (SUP-09 is about reproduction speed, not
#                                        degeneracy instrumentation; keep config
#                                        minimal for newcomers)
#   - cache.enabled false               (auto-disabled by --max-frames anyway;
#                                        make it explicit so newcomers see it)

data:
  kitti_root: "/data"
  sequence: "00"

kiss_icp:
  max_range: 100.0
  min_range: 5.0
  voxel_size: 1.0

gtsam:
  odom_sigmas: [0.1, 0.1, 0.1, 0.01, 0.01, 0.01]
  prior_sigmas: [0.01, 0.01, 0.01, 0.001, 0.001, 0.001]
  loop_closure_sigmas: [0.05, 0.05, 0.05, 0.005, 0.005, 0.005]
  gps_sigmas: [0.5, 0.5, 1.0]

sup07:
  enabled: false

loop_closure:
  mode: v1
  distance_threshold: 15.0
  min_frame_gap: 100
  icp_fitness_threshold: 0.9
  icp_downsample_voxel: 1.0

ekf:
  process_noise_pos: 0.1
  process_noise_vel: 0.5
  process_noise_rot: 0.01
  measurement_noise_pos: 0.05
  measurement_noise_rot: 0.01

mapping:
  master_voxel_size: 0.10
  voxel_size: 0.15
  max_range: 30.0
  downsample_every: 500
  road_z_min: -2.0
  road_z_max: -1.5
  intensity_threshold: 0.40
  dbscan_eps: 0.7
  dbscan_min_points: 40
  curb_grid_size: 0.30
  curb_z_min: -2.0
  curb_z_max: -1.2
  curb_height_min: 0.10
  curb_height_max: 0.25
  curb_road_z_top: -1.55
  curb_dbscan_eps: 0.6
  curb_dbscan_min_points: 10
  curb_trim_k: 1.2

export:
  lat0: 49.0
  lon0: 8.4
  polyline_bin_size: 0.5
  polyline_simplify_epsilon: 0.05
  lane:
    min_linearity: 0.75
    min_length: 1.0
    line_thin_max_thickness: 0.8
    line_thick_max_thickness: 2.0
  curb:
    min_linearity: 0.75
    min_length: 1.0
    max_thickness: 0.7
    trim_k: 1.0

cache:
  enabled: false
  root: "cache/kitti"

output:
  dir: "/app/results"
